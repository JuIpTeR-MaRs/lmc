<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多阶段去中心化投票系统</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 0 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 30px; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }
        .main-content { padding: 20px 30px; }
        .card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 600; margin: 0 0 15px; color: #333; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge.active { background: #d4edda; color: #155724; }
        .badge.running { background: #d1ecf1; color: #0c5460; }
        .badge.paused { background: #fff3cd; color: #856404; }
        .badge.ended { background: #f8d7da; color: #721c24; }
        .badge.pending { background: #e2e3e5; color: #495057; }
        .badge.approved { background: #d4edda; color: #155724; }
        .badge.rejected { background: #f8d7da; color: #721c24; }
        .btn { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn:hover { background: #5a6fd6; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .input-group { margin-bottom: 10px; }
        input, textarea, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: calc(100% - 24px); margin-bottom: 10px; }
        textarea { min-height: 80px; resize: vertical; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .election-item { background: white; border: 1px solid #e9ecef; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .election-item:hover { border-color: #667eea; }
        .election-title { font-weight: 600; color: #333; }
        .election-desc { color: #666; font-size: 14px; margin: 5px 0; }
        .election-meta { font-size: 13px; color: #888; }
        .candidate-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px; background: white; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .candidate-info { flex: 1; }
        .candidate-name { font-weight: 600; color: #333; }
        .candidate-desc { color: #666; font-size: 13px; margin-top: 4px; }
        .vote-section { text-align: right; }
        .vote-count { font-size: 24px; font-weight: bold; color: #667eea; }
        .vote-percent { font-size: 12px; color: #888; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; }
        .msg { padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 14px; }
        .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .msg.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 25px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: 600; margin: 0 0 20px; }
        .close-btn { float: right; cursor: pointer; font-size: 20px; color: #999; }
        .tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: 500; color: #666; border-bottom: 2px solid transparent; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .wallet-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #f8f9fa; border-bottom: 1px solid #eee; }
        .wallet-status { font-size: 14px; }
        .account-display { font-family: monospace; font-size: 13px; color: #666; }
        .permission-badge { font-size: 11px; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="wallet-bar">
            <div>
                <span id="walletStatus" class="wallet-status">🔒 未连接钱包</span>
                <button id="connectBtn" class="btn">连接钱包</button>
            </div>
            <span id="accountDisplay" class="account-display"></span>
        </div>
        
        <div class="header">
            <h1>🗳️ 多阶段去中心化投票系统</h1>
            <p>基于区块链的公平公正投票解决方案</p>
        </div>

        <div class="main-content">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('elections')">投票活动列表</div>
                <div class="tab" onclick="switchTab('create')">创建投票活动</div>
                <div class="tab" onclick="switchTab('manage')">权限管理</div>
            </div>

            <div id="electionsTab" class="tab-content">
                <div class="card">
                    <div class="card-title">📋 投票活动</div>
                    <div id="electionList">
                        <p style="text-align:center;color:#999;padding:20px;">请先连接钱包查看投票活动</p>
                    </div>
                </div>
            </div>

            <div id="createTab" class="tab-content" style="display:none;">
                <div class="card">
                    <div class="card-title">➕ 创建新投票活动</div>
                    <div class="input-group">
                        <input type="text" id="createTitle" placeholder="活动标题">
                    </div>
                    <div class="input-group">
                        <textarea id="createDesc" placeholder="活动描述"></textarea>
                    </div>
                    <div class="flex">
                        <input type="datetime-local" id="createStart" placeholder="开始时间">
                        <input type="datetime-local" id="createEnd" placeholder="结束时间">
                    </div>
                    <div class="flex">
                        <input type="number" id="createMaxCandidates" placeholder="候选人上限" value="10" min="1">
                        <select id="createVoteMode">
                            <option value="0">1人1票</option>
                            <option value="1">按代币权重投票</option>
                        </select>
                    </div>
                    <button id="createBtn" class="btn btn-success" style="margin-top:10px;">创建活动</button>
                </div>
            </div>

            <div id="manageTab" class="tab-content" style="display:none;">
                <div class="card">
                    <div class="card-title">👤 管理员管理</div>
                    <div class="flex">
                        <input type="text" id="adminAddress" placeholder="管理员地址" style="width:250px;">
                        <button id="addAdminBtn" class="btn">添加管理员</button>
                        <button id="removeAdminBtn" class="btn btn-danger">移除管理员</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">👥 审核员管理</div>
                    <div class="flex">
                        <input type="text" id="reviewerAddress" placeholder="审核员地址" style="width:250px;">
                        <button id="addReviewerBtn" class="btn">添加审核员</button>
                        <button id="removeReviewerBtn" class="btn btn-danger">移除审核员</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="electionModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modalTitle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="msgBox"></div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script>
        const CONTRACT_ADDRESS = "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512";
        
        const ABI = [
            "function owner() view returns (address)",
            "function admins(address) view returns (bool)",
            "function reviewers(address) view returns (bool)",
            "function electionCount() view returns (uint256)",
            "function createElection(string, string, uint256, uint256, uint256, uint8)",
            "function startElection(uint256)",
            "function pauseElection(uint256)",
            "function resumeElection(uint256)",
            "function endElection(uint256)",
            "function addAdmin(address)",
            "function removeAdmin(address)",
            "function addReviewer(address)",
            "function removeReviewer(address)",
            "function applyCandidate(uint256, string, string)",
            "function reviewCandidate(uint256, uint256, bool)",
            "function vote(uint256, uint256)",
            "function getElectionInfo(uint256) view returns (tuple(uint256,string,string,uint256,uint256,uint256,uint8,uint8,uint256,bool))",
            "function getCandidates(uint256) view returns (tuple(uint256,string,string,address,uint8,uint256)[])",
            "function getApprovedCandidates(uint256) view returns (tuple(uint256,string,string,address,uint8,uint256)[])",
            "function getAllElections() view returns (tuple(uint256,string,string,uint256,uint256,uint256,uint8,uint8,uint256,bool)[])",
            "function hasVoted(uint256, address) view returns (bool)"
        ];

        let signer, contract, userAddress;
        let isAdmin = false, isReviewer = false;

        function showMsg(text, type = 'success') {
            const msgBox = document.getElementById('msgBox');
            msgBox.innerHTML = `<div class="msg ${type}">${text}</div>`;
            setTimeout(() => msgBox.innerHTML = '', 5000);
        }

        function formatTime(timestamp) {
            if (!timestamp || timestamp == 0) return '—';
            return new Date(timestamp * 1000).toLocaleString('zh-CN');
        }

        function getStatusText(status) {
            const statusMap = { 0: '已创建', 1: '进行中', 2: '已暂停', 3: '已结束' };
            return statusMap[status] || '未知';
        }

        function getStatusBadge(status) {
            const badgeMap = { 0: 'pending', 1: 'running', 2: 'paused', 3: 'ended' };
            return badgeMap[status] || 'pending';
        }

        function getCandidateStatusText(status) {
            const statusMap = { 0: '待审核', 1: '已通过', 2: '已驳回' };
            return statusMap[status] || '未知';
        }

        function getCandidateStatusBadge(status) {
            const badgeMap = { 0: 'pending', 1: 'approved', 2: 'rejected' };
            return badgeMap[status] || 'pending';
        }

        async function connectWallet() {
            if (!window.ethereum) return alert('请安装 MetaMask!');
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                userAddress = accounts[0];
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                document.getElementById('walletStatus').innerHTML = '✅ 已连接';
                document.getElementById('accountDisplay').innerText = userAddress.slice(0,6)+'...'+userAddress.slice(-4);

                const code = await provider.getCode(CONTRACT_ADDRESS);
                if (code === '0x') {
                    alert('错误：该地址上没有部署合约！');
                    return;
                }

                const owner = await contract.owner();
                isAdmin = await contract.admins(userAddress);
                isReviewer = await contract.reviewers(userAddress);

                if (isAdmin || userAddress.toLowerCase() === owner.toLowerCase()) {
                    document.getElementById('walletStatus').innerHTML += '<span class="badge permission-badge active">管理员</span>';
                } else if (isReviewer) {
                    document.getElementById('walletStatus').innerHTML += '<span class="badge permission-badge approved">审核员</span>';
                }

                await loadElections();
            } catch (e) {
                alert('连接失败: '+e.message);
            }
        }

        async function loadElections() {
            if (!contract) return;
            try {
                const elections = await contract.getAllElections();
                const list = document.getElementById('electionList');
                
                if (elections.length === 0) {
                    list.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暂无投票活动</p>';
                    return;
                }

                let html = '';
                for (const e of elections) {
                    const [id, title, desc, startTime, endTime, maxCandidates, voteMode, status, totalVotes, resultLocked] = e;
                    const statusText = getStatusText(status);
                    const badgeClass = getStatusBadge(status);
                    const voteModeText = voteMode == 0 ? '1人1票' : '代币权重';
                    
                    html += `
                        <div class="election-item" onclick="showElectionDetail(${id})">
                            <div class="flex-between">
                                <div>
                                    <div class="election-title">${title} <span class="badge ${badgeClass}">${statusText}</span></div>
                                    <div class="election-desc">${desc}</div>
                                </div>
                                <button class="btn btn-secondary">查看详情</button>
                            </div>
                            <div class="election-meta">
                                📅 ${formatTime(startTime)} ~ ${formatTime(endTime)} | 👥 最多${maxCandidates}位候选人 | 🗳️ ${voteModeText} | 总票数: ${totalVotes}
                            </div>
                        </div>
                    `;
                }
                list.innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        async function showElectionDetail(electionId) {
            if (!contract) return;
            try {
                const info = await contract.getElectionInfo(electionId);
                const candidates = await contract.getCandidates(electionId);
                const [id, title, desc, startTime, endTime, maxCandidates, voteMode, status, totalVotes, resultLocked] = info;
                
                const statusText = getStatusText(status);
                const voteModeText = voteMode == 0 ? '1人1票' : '代币权重';
                const hasVoted = await contract.hasVoted(electionId, userAddress);
                
                let html = `
                    <p><strong>描述：</strong>${desc}</p>
                    <p><strong>时间：</strong>${formatTime(startTime)} ~ ${formatTime(endTime)}</p>
                    <p><strong>候选人上限：</strong>${maxCandidates}</p>
                    <p><strong>投票模式：</strong>${voteModeText}</p>
                    <p><strong>总票数：</strong>${totalVotes}</p>
                    <p><strong>结果锁定：</strong>${resultLocked ? '是' : '否'}</p>
                    <hr>
                `;

                if (isAdmin) {
                    html += `<div class="flex" style="margin-bottom:15px;">`;
                    if (status == 0) html += `<button class="btn btn-success" onclick="handleAdminAction(${electionId}, 'start')">开始投票</button>`;
                    if (status == 1) html += `<button class="btn btn-warning" onclick="handleAdminAction(${electionId}, 'pause')">暂停投票</button>`;
                    if (status == 2) html += `<button class="btn btn-success" onclick="handleAdminAction(${electionId}, 'resume')">恢复投票</button>`;
                    if (status == 1 || status == 2) html += `<button class="btn btn-danger" onclick="handleAdminAction(${electionId}, 'end')">结束投票</button>`;
                    html += `</div><hr>`;
                }

                html += `<div><strong>候选人 (${candidates.length}/${maxCandidates})</strong></div>`;
                
                if (status == 0 || status == 1) {
                    html += `<div style="margin:10px 0;">
                        <input type="text" id="applyName" placeholder="候选人姓名" style="width:45%;">
                        <input type="text" id="applyInfo" placeholder="候选人简介" style="width:45%;">
                        <button class="btn btn-success" style="width:100%;margin-top:5px;" onclick="applyCandidate(${electionId})">申请成为候选人</button>
                    </div>`;
                }

                if (candidates.length === 0) {
                    html += '<p style="color:#999;">暂无候选人</p>';
                } else {
                    let totalApprovedVotes = 0;
                    const approvedCandidates = candidates.filter(c => c[4] == 1);
                    for (const c of approvedCandidates) {
                        totalApprovedVotes += c[5];
                    }

                    for (const c of candidates) {
                        const [cId, cName, cInfo, applicant, cStatus, cVotes] = c;
                        const cStatusText = getCandidateStatusText(cStatus);
                        const cBadgeClass = getCandidateStatusBadge(cStatus);
                        const percent = totalApprovedVotes > 0 ? ((cVotes / totalApprovedVotes) * 100).toFixed(1) : 0;
                        
                        html += `
                            <div class="candidate-item">
                                <div class="candidate-info">
                                    <div class="candidate-name">${cName} <span class="badge ${cBadgeClass}">${cStatusText}</span></div>
                                    <div class="candidate-desc">${cInfo || '暂无简介'}</div>
                                    <div style="font-size:12px;color:#999;">申请人: ${applicant.slice(0,6)}...${applicant.slice(-4)}</div>
                                </div>
                                <div class="vote-section">
                                    <div class="vote-count">${cVotes}</div>
                                    <div class="vote-percent">${percent}%</div>
                                    <div class="progress-bar" style="width:100px;"><div class="progress-fill" style="width:${percent}%"></div></div>
                                    ${cStatus == 1 && status == 1 && !hasVoted ? 
                                        `<button class="btn" style="margin-top:10px;" onclick="vote(${electionId}, ${cId})">投票</button>` : 
                                        (hasVoted ? '<span style="color:green;font-size:12px;">✅ 已投票</span>' : '')}
                                </div>
                            </div>
                        `;

                        if (isReviewer && cStatus == 0) {
                            html += `<div style="text-align:right;margin-bottom:5px;">
                                <button class="btn btn-success" style="font-size:12px;padding:4px 10px;" onclick="reviewCandidate(${electionId}, ${cId}, true)">通过</button>
                                <button class="btn btn-danger" style="font-size:12px;padding:4px 10px;" onclick="reviewCandidate(${electionId}, ${cId}, false)">驳回</button>
                            </div>`;
                        }
                    }
                }

                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('electionModal').classList.add('active');
            } catch (e) {
                console.error(e);
            }
        }

        function closeModal() {
            document.getElementById('electionModal').classList.remove('active');
        }

        async function handleAdminAction(electionId, action) {
            const btnMap = { start: '开始', pause: '暂停', resume: '恢复', end: '结束' };
            if (!confirm(`确定要${btnMap[action]}该投票活动吗？`)) return;
            
            try {
                let tx;
                if (action == 'start') tx = await contract.startElection(electionId);
                else if (action == 'pause') tx = await contract.pauseElection(electionId);
                else if (action == 'resume') tx = await contract.resumeElection(electionId);
                else if (action == 'end') tx = await contract.endElection(electionId);
                
                await tx.wait();
                showMsg(`✅ ${btnMap[action]}成功！`);
                closeModal();
                await loadElections();
            } catch (e) {
                showMsg('❌ 操作失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function applyCandidate(electionId) {
            const name = document.getElementById('applyName').value;
            const info = document.getElementById('applyInfo').value;
            if (!name) return alert('请输入姓名');
            
            try {
                const tx = await contract.applyCandidate(electionId, name, info);
                await tx.wait();
                showMsg('✅ 申请提交成功，等待审核');
                document.getElementById('applyName').value = '';
                document.getElementById('applyInfo').value = '';
                showElectionDetail(electionId);
            } catch (e) {
                showMsg('❌ 申请失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function reviewCandidate(electionId, candidateId, approved) {
            try {
                const tx = await contract.reviewCandidate(electionId, candidateId, approved);
                await tx.wait();
                showMsg(approved ? '✅ 已通过审核' : '✅ 已驳回申请');
                showElectionDetail(electionId);
            } catch (e) {
                showMsg('❌ 操作失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function vote(electionId, candidateId) {
            try {
                const tx = await contract.vote(electionId, candidateId);
                await tx.wait();
                showMsg('✅ 投票成功！');
                showElectionDetail(electionId);
            } catch (e) {
                showMsg('❌ 投票失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function createElection() {
            if (!contract) {
                return showMsg('❌ 请先连接钱包！', 'error');
            }
            const title = document.getElementById('createTitle').value;
            const desc = document.getElementById('createDesc').value;
            const startStr = document.getElementById('createStart').value;
            const endStr = document.getElementById('createEnd').value;
            const maxCandidates = parseInt(document.getElementById('createMaxCandidates').value);
            const voteMode = parseInt(document.getElementById('createVoteMode').value);

            if (!title || !startStr || !endStr) {
                return alert('请填写完整信息');
            }

            const startTime = Math.floor(new Date(startStr).getTime() / 1000);
            const endTime = Math.floor(new Date(endStr).getTime() / 1000);

            try {
                const tx = await contract.createElection(title, desc, startTime, endTime, maxCandidates, voteMode);
                await tx.wait();
                showMsg('✅ 投票活动创建成功！');
                document.getElementById('createTitle').value = '';
                document.getElementById('createDesc').value = '';
                document.getElementById('createStart').value = '';
                document.getElementById('createEnd').value = '';
                switchTab('elections');
                await loadElections();
            } catch (e) {
                showMsg('❌ 创建失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function addAdmin() {
            const addr = document.getElementById('adminAddress').value;
            if (!ethers.isAddress(addr)) return alert('无效地址');
            try {
                const tx = await contract.addAdmin(addr);
                await tx.wait();
                showMsg('✅ 管理员添加成功');
                document.getElementById('adminAddress').value = '';
            } catch (e) {
                showMsg('❌ 操作失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function removeAdmin() {
            const addr = document.getElementById('adminAddress').value;
            if (!ethers.isAddress(addr)) return alert('无效地址');
            try {
                const tx = await contract.removeAdmin(addr);
                await tx.wait();
                showMsg('✅ 管理员移除成功');
                document.getElementById('adminAddress').value = '';
            } catch (e) {
                showMsg('❌ 操作失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function addReviewer() {
            const addr = document.getElementById('reviewerAddress').value;
            if (!ethers.isAddress(addr)) return alert('无效地址');
            try {
                const tx = await contract.addReviewer(addr);
                await tx.wait();
                showMsg('✅ 审核员添加成功');
                document.getElementById('reviewerAddress').value = '';
            } catch (e) {
                showMsg('❌ 操作失败: ' + (e.reason || e.message), 'error');
            }
        }

        async function removeReviewer() {
            const addr = document.getElementById('reviewerAddress').value;
            if (!ethers.isAddress(addr)) return alert('无效地址');
            try {
                const tx = await contract.removeReviewer(addr);
                await tx.wait();
                showMsg('✅ 审核员移除成功');
                document.getElementById('reviewerAddress').value = '';
            } catch (e) {
                showMsg('❌ 操作失败: ' + (e.reason || e.message), 'error');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelector(`.tab:nth-child(${tab == 'elections' ? 1 : tab == 'create' ? 2 : 3})`).classList.add('active');
            document.getElementById(`${tab}Tab`).style.display = 'block';
            
            if (tab === 'create' && !isAdmin) {
                showMsg('⚠️ 您不是管理员，无法创建投票活动', 'info');
            }
            if (tab === 'manage' && !isAdmin) {
                showMsg('⚠️ 您不是管理员，无法管理权限', 'info');
            }
        }

        document.getElementById('connectBtn').onclick = connectWallet;
        document.getElementById('createBtn').onclick = createElection;
        document.getElementById('addAdminBtn').onclick = addAdmin;
        document.getElementById('removeAdminBtn').onclick = removeAdmin;
        document.getElementById('addReviewerBtn').onclick = addReviewer;
        document.getElementById('removeReviewerBtn').onclick = removeReviewer;

        window.onclick = function(e) {
            if (e.target == document.getElementById('electionModal')) {
                closeModal();
            }
        };

        window.onload = async () => {
            if (window.ethereum && window.ethereum.selectedAddress) {
                connectWallet();
            }
        };
    </script>
</body>
</html>
